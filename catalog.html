<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOE Formliners – Product Catalog</title>

  <!-- Fonts: Inter (matches index) + Barlow for catalog headings -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="catalog.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       MOBILE MENU DRAWER
  ═══════════════════════════════════════════════ -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <ul>
      <li><a href="jlife.html" class="mobile-link">JLIFE</a></li>
      <li><a href="catalog.html" class="mobile-link">FORMLINERS</a></li>
    </ul>
  </div>

  <!-- ═══════════════════════════════════════════════
       NAVIGATION
  ═══════════════════════════════════════════════ -->
  <nav class="nav">
    <a class="nav-logo" href="index.html">
      <img src="assets/CpinnoLogo.svg" alt="CPInno Logo" />
    </a>
    <ul class="nav-links">
      <li><a href="ECAT.HTML">JLIFE</a></li>
      <li><a href="catalog.html" class="nav-link--active">FORMLINERS</a></li>
    </ul>
    <button
      class="hamburger"
      id="hamburger"
      aria-label="Toggle menu"
      aria-expanded="false"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════════
       PAGE HERO BAR
  ═══════════════════════════════════════════════ -->
  <div class="hero-bar">
    <div class="hero-bar__inner">
      <h1 class="hero-bar__title">NOE</h1>
      <span class="hero-bar__count" id="js-count">— Products</span>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       CATALOG LAYOUT
  ═══════════════════════════════════════════════ -->
  <main class="catalog-layout">

    <!-- ── Sidebar ─────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar__section">
        <h3 class="sidebar__heading">Design Type</h3>
        <div class="sidebar__divider"></div>
        <ul class="sidebar__list" id="js-filter-list">
          <!-- Populated by JS -->
        </ul>
      </div>
    </aside>

    <!-- ── Main content ────────────────────────── -->
    <section class="catalog-main">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar__search">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" id="js-search" placeholder="Search part number or description…" />
        </div>
        <div class="toolbar__sort">
          <label class="toolbar__sort-label" for="js-sort">Sort By:</label>
          <select id="js-sort">
            <option value="default">Default</option>
            <option value="az">Alphabetically, A–Z</option>
          </select>
        </div>
      </div>

      <!-- Product grid -->
      <div class="product-grid" id="js-grid">
        <!-- Populated by JS -->
      </div>

      <!-- Pagination -->
      <nav class="pagination" id="js-pagination" aria-label="Page navigation">
        <!-- Populated by JS -->
      </nav>

    </section>
  </main>

  <!-- ═══════════════════════════════════════════════
       MODAL
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="js-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="js-modal-title">
    <div class="modal" id="js-modal">
      <button class="modal__close" id="js-modal-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal__image-wrap" id="js-modal-img-wrap">
        <!-- Populated by JS -->
      </div>
      <div class="modal__body">
        <p class="modal__part-no" id="js-modal-part"></p>
        <h2 class="modal__title" id="js-modal-title"></h2>
        <span class="modal__badge" id="js-modal-badge"></span>
        <table class="modal__specs" id="js-modal-specs">
          <!-- Populated by JS -->
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════════ -->
  <script src="products.js"></script>
  <script src="catalog.js"></script>

</body>
</html>
