<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GC – Product Catalog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="catalog.css" />
  </head>
  <body>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
      <ul>
        <li><a href="#" class="mobile-link">HOME</a></li>
        <li><a href="#" class="mobile-link active">CATALOG</a></li>
      </ul>
    </div>

    <!-- Navigation -->
    <nav class="nav">
      <a class="nav-logo" href="#">
        <span>GC</span>
      </a>
      <ul class="nav-links">
        <li><a href="#">HOME</a></li>
        <li><a href="#" class="nav-link--active">CATALOG</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>

    <!-- Hero Bar -->
    <div class="hero-bar">
      <div class="hero-bar__inner">
        <h1 class="hero-bar__title">GC</h1>
        <span class="hero-bar__count" id="js-count">— Products</span>
      </div>
    </div>

    <!-- Catalog Layout -->
    <main class="catalog-layout">
      <aside class="sidebar">
        <div class="sidebar__section">
          <h3 class="sidebar__heading">Design Type</h3>
          <div class="sidebar__divider"></div>
          <ul class="sidebar__list" id="js-filter-list"></ul>
        </div>
      </aside>

      <section class="catalog-main">
        <div class="toolbar">
          <div class="toolbar__search">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M11 11L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="js-search" placeholder="Search products…" />
          </div>
          <div class="toolbar__sort">
            <label class="toolbar__sort-label" for="js-sort">Sort By:</label>
            <select id="js-sort">
              <option value="default">Default</option>
              <option value="az">Alphabetically, A–Z</option>
            </select>
          </div>
        </div>

        <div class="product-grid" id="js-grid"></div>
        <nav class="pagination" id="js-pagination" aria-label="Page navigation"></nav>
      </section>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="js-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="js-modal-title">
      <div class="modal" id="js-modal">
        <button class="modal__close" id="js-modal-close" aria-label="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="modal__image-wrap" id="js-modal-img-wrap"></div>
        <div class="modal__body">
          <h2 class="modal__title" id="js-modal-title"></h2>
          <span class="modal__badge" id="js-modal-badge"></span>
          <p class="modal__desc" id="js-modal-desc"></p>
        </div>
      </div>
    </div>
      <!-- ═══════════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════════ -->
    <script src="../data/GCproducts.js"></script>
    <script src="GC-catalog.js"></script>
  </body>
</html>
